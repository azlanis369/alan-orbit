name: Deploy to Vercel

# Server-side geo for the crisis-help lines needs a serverless host, so this
# deploys the app + the /api/crisis-lines function to Vercel (production).
#
# Dormant by default: it only runs once you opt in by setting the repository
# variable DEPLOY_VERCEL=true and adding the three secrets below. Until then
# the job is SKIPPED (never a red ❌), so it won't clash if you instead connect
# the repo through the Vercel dashboard.
#
#   Secrets (Settings → Secrets and variables → Actions → Secrets):
#     VERCEL_TOKEN        — vercel.com/account/tokens
#     VERCEL_ORG_ID       — from `.vercel/project.json` after `vercel link`
#     VERCEL_PROJECT_ID   — from `.vercel/project.json` after `vercel link`
#   Variable (… → Variables):
#     DEPLOY_VERCEL = true

on:
  push:
    branches: ["main", "claude/prototype-projection-deployment-zx0gx0"]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    if: ${{ vars.DEPLOY_VERCEL == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (bundles the /api function + the Vite app)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to production
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to: $url"
          {
            echo "### ✅ ORBIT deployed to Vercel"
            echo ""
            echo "Production URL: $url"
            echo ""
            echo "Verify server-side geo: \`$url/api/crisis-lines?country=MY\`"
          } >> "$GITHUB_STEP_SUMMARY"
